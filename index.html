<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Midaxas — Links</title>
    <link rel="icon" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="hero">
        <img class="avatar" src="/favicon.svg" alt="avatar" />
        <div class="title">
          <h1>Midaxas</h1>
          <p class="tag">Developer · Researcher</p>
        </div>
      </header>

      <main class="card">
        <nav class="links">
          <a class="btn" href="https://github.com/Midaxas" target="_blank" rel="noopener">
            <span class="label">GitHub</span>
          </a>
          <a class="btn" href="https://twitter.com/" target="_blank" rel="noopener">
            <span class="label">Twitter</span>
          </a>
          <a class="btn" href="/" target="_self">
            <span class="label">Projects</span>
          </a>
          <button class="btn" id="emailBtn"><span class="label">Copy Email</span></button>
        </nav>

        <div class="meta">
          <button id="themeToggle" class="ghost">Toggle theme</button>
        </div>
      </main>
    </div>

    <script src="/js/script.js"></script>
  </body>
</html>
